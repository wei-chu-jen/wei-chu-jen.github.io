<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的部落格文章 | Wei-Chu Jen</title>
    <style>
        /* Medium 風格的核心設定 */
        body {
            font-family: Georgia, 'Times New Roman', Times, serif; /* 內文使用優雅的襯線字體 */
            font-size: 20px; /* 字體放大，提升閱讀舒適度 */
            line-height: 1.8; /* 寬鬆的行距 */
            color: #292929; /* 深灰色而非純黑，降低對比刺眼感 */
            max-width: 680px; /* 縮窄閱讀區塊，這是 Medium 排版的靈魂 */
            margin: 0 auto;
            padding: 40px 20px 100px 20px;
            background-color: #fff;
        }
        
        /* 標題使用無襯線字體，產生現代感與對比 */
        h1, h2, h3 {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: #242424;
            line-height: 1.3;
        }
        h1 {
            font-size: 40px;
            font-weight: 700;
            margin-bottom: 10px;
        }
        h2 {
            font-size: 28px;
            margin-top: 50px;
            margin-bottom: 15px;
        }
        p {
            margin-bottom: 2em; /* 段落之間給予充足的呼吸空間 */
        }
        
        /* 作者資訊區塊 */
        .author-meta {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            font-size: 15px;
            color: #6b6b6b;
            display: flex;
            align-items: center;
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 1px solid #f2f2f2;
        }
        .author-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background-color: #3498db; /* 你可以把這裡換成真實頭像的 img */
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            margin-right: 15px;
        }
        
        /* Medium 風格的引言區塊 */
        blockquote {
            border-left: 3px solid #242424;
            margin: 0 0 2em 0;
            padding: 0 0 0 20px;
            font-style: italic;
            color: #6b6b6b;
            font-size: 24px; /* 引言字體稍微加大 */
        }
        
        /* 文章分隔線 (三個點) */
        hr {
            border: none;
            text-align: center;
            margin: 50px 0;
        }
        hr::after {
            content: "...";
            letter-spacing: 1em;
            font-size: 28px;
            color: #242424;
        }
        
        /* 導覽列 */
        .nav-bar {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            font-size: 16px;
            margin-bottom: 50px;
        }
        .nav-bar a {
            color: #1a8917; /* Medium 的經典綠色，你可以改回你的主色調 */
            text-decoration: none;
        }
        .nav-bar a:hover {
            text-decoration: underline;
        }
    </style>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
</head>
<body>
    <div class="nav-bar">
        <a href="private.html">← 返回私領域</a>
    </div>

    <article>
        <h1>我好像知道為甚麼我很討厭小孩的一些行為了...</h1>
        
        <div class="author-meta">
            <div class="author-avatar">W</div>
            <div>
                <div><strong>Wei-Chu Jen</strong></div>
            </div>
        </div>

        <p>眾所周知，我厭童。</p>
        <p>我自己知道，我很討厭小孩在公眾場合大哭、鬧脾氣或是做出一些沒那麼社會話的行為，從我高中開始就這樣了。</p>

    </article>
</body>
</html>
